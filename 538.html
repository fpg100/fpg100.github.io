let allCards=[...RAW],filteredCards=[...RAW],currentIdx=0,flipped=false,known=new Set(),unsure=new Set(),currentCat='all',currentMode='flash',quizAnswered=false,quizOptions=[],correctOpt='';

function setCategory(cat,el){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(cat==='all') filteredCards=[...allCards];
  else if(cat==='unsure') filteredCards=allCards.filter(c=>unsure.has(c.w));
  else filteredCards=allCards.filter(c=>c.cat===cat);
  currentIdx=0;flipped=false;render();
}
function setMode(mode){
  currentMode=mode;
  ['flash','quiz','list'].forEach(m=>{
    document.getElementById('mb-'+m).classList.toggle('active',m===mode);
    document.getElementById(m+'-area').style.display=m===mode?'':'none';
  });
  document.getElementById('search-row').style.display=mode==='list'?'':'none';
  flipped=false;quizAnswered=false;render();
}
function shuffleCards(){
  for(let i=filteredCards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[filteredCards[i],filteredCards[j]]=[filteredCards[j],filteredCards[i]];}
  currentIdx=0;flipped=false;
  const lbl=document.getElementById('shuffle-label');lbl.textContent='已洗牌';setTimeout(()=>lbl.textContent='',1500);
  render();
}
function resetProgress(){known.clear();unsure.clear();currentIdx=0;flipped=false;document.getElementById('btn-unsure-cat').style.display='none';render();}
function markKnown(){const c=filteredCards[currentIdx];known.add(c.w);unsure.delete(c.w);next();}
function markUnsure(){const c=filteredCards[currentIdx];unsure.add(c.w);known.delete(c.w);document.getElementById('btn-unsure-cat').style.display='';next();}
function next(){if(currentIdx<filteredCards.length-1)currentIdx++;flipped=false;quizAnswered=false;render();}
function prev(){if(currentIdx>0)currentIdx--;flipped=false;quizAnswered=false;render();}
function flipCard(){flipped=!flipped;render();}
function catLabel(c){return c==='1'?'第1类':c==='2'?'第2类':'第3类';}
function buildQuizOptions(card){
  const wrong=allCards.filter(c=>c.w!==card.w&&c.cn!==card.cn).sort(()=>Math.random()-0.5).slice(0,3);
  return{opts:[...wrong.map(c=>c.cn),card.cn].sort(()=>Math.random()-0.5),correct:card.cn};
}
function updateStats(){
  const total=filteredCards.length,k=filteredCards.filter(c=>known.has(c.w)).length,u=filteredCards.filter(c=>unsure.has(c.w)).length;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-known').textContent=k;
  document.getElementById('stat-unsure').textContent=u;
  document.getElementById('stat-idx').textContent=total>0?`${currentIdx+1}/${total}`:'0/0';
  document.getElementById('prog-bar').style.width=(total>0?Math.round(k/total*100):0)+'%';
}
function render(){updateStats();if(currentMode==='flash')renderFlash();else if(currentMode==='quiz')renderQuiz();else renderList();}
function renderFlash(){
  const area=document.getElementById('flash-area');
  if(!filteredCards.length){area.innerHTML='<div style="text-align:center;color:var(--text3);padding:2rem">该分类暂无单词</div>';return;}
  const card=filteredCards[currentIdx],isK=known.has(card.w),isU=unsure.has(card.w);
  const sc=isK?'#1D9E75':isU?'#BA7517':'transparent';
  let html=`<div class="flashcard" onclick="flipCard()" style="border-left:3px solid ${sc}"><span class="card-cat">${catLabel(card.cat)}</span><span class="card-num">${currentIdx+1} / ${filteredCards.length}</span>`;
  if(!flipped){html+=`<div class="card-word">${card.w}</div><div class="card-pos">${card.pos}</div><div class="flip-hint">点击翻转查看释义</div>`;}
  else{html+=`<div class="card-word" style="font-size:18px">${card.w}</div><div class="card-pos">${card.pos}</div><div class="card-back">${card.cn}</div><div class="card-synonyms">同义替换：${card.syn}</div>`;}
  html+=`</div><div class="btn-row"><button class="btn-action btn-prev" onclick="prev()">← 上一张</button><button class="btn-action btn-know" onclick="markKnown()">✓ 已掌握</button><button class="btn-action btn-unsure" onclick="markUnsure()">? 待复习</button><button class="btn-action btn-next" onclick="next()">下一张 →</button></div>`;
  area.innerHTML=html;
}
function renderQuiz(){
  const area=document.getElementById('quiz-area');
  if(!filteredCards.length){area.innerHTML='<div style="text-align:center;color:var(--text3);padding:2rem">该分类暂无单词</div>';return;}
  const card=filteredCards[currentIdx];
  if(!quizAnswered){const b=buildQuizOptions(card);quizOptions=b.opts;correctOpt=b.correct;}
  let html=`<div class="flashcard" style="cursor:default;margin-bottom:0.5rem"><span class="card-cat">${catLabel(card.cat)}</span><span class="card-num">${currentIdx+1} / ${filteredCards.length}</span><div class="card-word">${card.w}</div><div class="card-pos">${card.pos}</div>${quizAnswered?`<div class="card-synonyms" style="margin-top:8px">同义替换：${card.syn}</div>`:''}</div><div class="quiz-opts">`;
  quizOptions.forEach(opt=>{
    let cls='quiz-opt';
    if(quizAnswered) cls+=opt===correctOpt?' correct':' wrong';
    html+=`<button class="${cls}" onclick="answerQuiz(this,'${opt.replace(/'/g,"\\'")}')">${opt}</button>`;
  });
  html+=`</div>`;
  if(quizAnswered) html+=`<div class="btn-row"><button class="btn-action btn-next" onclick="next()">下一题 →</button></div>`;
  area.innerHTML=html;
}
function answerQuiz(btn,opt){
  if(quizAnswered)return;quizAnswered=true;
  const card=filteredCards[currentIdx];
  if(opt===correctOpt){known.add(card.w);unsure.delete(card.w);}
  else{unsure.add(card.w);known.delete(card.w);document.getElementById('btn-unsure-cat').style.display='';}
  render();
}
function renderList(){
  const area=document.getElementById('list-area');
  const q=(document.getElementById('search-input')||{value:''}).value.toLowerCase();
  const cards=q?filteredCards.filter(c=>c.w.toLowerCase().includes(q)||c.cn.includes(q)||c.syn.toLowerCase().includes(q)):filteredCards;
  if(!cards.length){area.innerHTML='<div style="text-align:center;color:var(--text3);padding:2rem">暂无结果</div>';return;}
  let html=`<div class="review-title">${cards.length} 个单词</div><div class="review-grid">`;
  cards.forEach(c=>{
    const isK=known.has(c.w),isU=unsure.has(c.w);
    html+=`<div class="review-card" onclick="jumpTo('${c.w}')"><div class="review-word">${c.w}</div><div class="review-cn">${c.cn}</div>${isK?'<div class="review-tag tag-known">✓ 已掌握</div>':isU?'<div class="review-tag tag-unsure">? 待复习</div>':''}</div>`;
  });
  html+=`</div>`;area.innerHTML=html;
}
function searchWords(){renderList();}
function jumpTo(word){
  const idx=filteredCards.findIndex(c=>c.w===word);
  if(idx>=0){currentIdx=idx;flipped=false;setMode('flash');}
}
render();
</script>
</body>
</html>
