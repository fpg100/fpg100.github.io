const shuffle=a=>{a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
function htmlEscape(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function groupStart(x){return Math.floor((x.rank-1)/5)*5+1}
function groupEnd(x){return Math.min(groupStart(x)+4, CAT_MAX[x.cat])}
function groupId(x){return `${x.cat}:${groupStart(x)}-${groupEnd(x)}`}
function groupLabel(g){if(g==='all')return '全部分组'; let [cat,range]=g.split(':'); return `${cat}｜考点词 ${range}`}
function populateGroups(){
  const sel=$('group'), prev=sel.value, cat=$('cat').value;
  let mains=DATA.filter(x=>x.kind==='考点词');
  if(cat!=='all' && cat!=='wrong') mains=mains.filter(x=>x.cat===cat);
  const groups=[...new Set(mains.sort((a,b)=>a.cat.localeCompare(b.cat)||a.rank-b.rank).map(groupId))];
  sel.innerHTML='<option value="all">全部分组</option>'+groups.map(g=>`<option value="${g}">${groupLabel(g)}</option>`).join('');
  sel.value=groups.includes(prev)?prev:'all'; sel.disabled=cat==='wrong';
}
function optionPool(item){return DATA.filter(x=>x.meaning!==item.meaning).map(x=>x.meaning).filter((v,i,a)=>a.indexOf(v)===i)}
function makeOptions(item){let opts=[item.meaning], ds=shuffle(optionPool(item)); for(const m of ds){if(opts.length>=4)break; opts.push(m)} return shuffle(opts)}
function filtered(){let cat=$('cat').value, kind=$('kind').value, group=$('group').value; let arr=DATA; if(cat==='wrong') arr=DATA.filter(x=>wrongIds.includes(x.id)); else { if(cat!=='all') arr=arr.filter(x=>x.cat===cat); if(group!=='all') arr=arr.filter(x=>groupId(x)===group); } if(kind!=='all') arr=arr.filter(x=>x.kind===kind); if($('order').value==='random') arr=shuffle(arr); else arr=[...arr].sort((a,b)=>a.cat.localeCompare(b.cat)||(a.rank-b.rank)||a.kind.localeCompare(b.kind)||a.word.localeCompare(b.word)); return arr}
function start(){pool=filtered();idx=0;score={right:0,wrong:0};$('total').textContent=pool.length; const g=$('group').value; $('groupNote').textContent=(g==='all'?'当前：全部分组':`当前：${groupLabel(g)}`) + `｜题型：${$('kind').value==='all'?'考点词 + 真题替换':$('kind').value}`; if(!pool.length){$('word').textContent='没有题目';$('options').innerHTML='';$('meta').textContent='当前条件下没有题目';updateStats();return}; show()}
function show(){answered=false; current=pool[idx]; $('word').textContent=current.word; $('badge').textContent=current.kind; $('badge').className='badge '+(current.kind==='考点词'?'main':'rep'); $('meta').textContent=current.cat+' ｜ 第 '+groupStart(current)+'-'+groupEnd(current)+' 组 ｜ '+current.kind; $('rank').textContent='原序号 '+current.rank; $('parent').textContent=current.kind==='真题替换' ? ('对应考点词：'+current.parent) : ('真题替换：'+(current.syn||'—')); $('feedback').textContent=''; let opts=makeOptions(current); $('options').innerHTML=opts.map(o=>`<button class="opt" data-v="${htmlEscape(o)}">${htmlEscape(o)}</button>`).join(''); document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>choose(b)); updateStats()}
function choose(btn){if(answered)return; answered=true; let ok=btn.dataset.v===current.meaning; if(ok){score.right++;btn.classList.add('correct');$('feedback').innerHTML='<span class="ok">回答正确</span>'}else{score.wrong++;btn.classList.add('wrong');addWrong(current.id);$('feedback').innerHTML='<span class="bad">回答错误</span>　正确答案：'+htmlEscape(current.meaning); document.querySelectorAll('.opt').forEach(b=>{if(b.dataset.v===current.meaning)b.classList.add('correct')})} document.querySelectorAll('.opt').forEach(b=>b.classList.add('disabled')); updateStats(); renderWrong()}
function next(){if(!pool.length)return; idx=(idx+1)%pool.length; show()}
function showAnswer(){if(!current||answered)return; answered=true; $('feedback').innerHTML='正确答案：<span class="ok">'+htmlEscape(current.meaning)+'</span>'; document.querySelectorAll('.opt').forEach(b=>{if(b.dataset.v===current.meaning)b.classList.add('correct'); b.classList.add('disabled')})}
function addWrong(id){if(!wrongIds.includes(id)){wrongIds.push(id);localStorage.setItem(KEY,JSON.stringify(wrongIds))}}
function updateStats(){let done=score.right+score.wrong; $('pos').textContent=pool.length?`${Math.min(idx+1,pool.length)}/${pool.length}`:'0/0'; $('right').textContent=score.right; $('wrong').textContent=score.wrong; $('rate').textContent=done?Math.round(score.right/done*100)+'%':'0%'; $('bar').style.width=pool.length?((idx)/pool.length*100)+'%':'0%'}
function renderWrong(){let arr=DATA.filter(x=>wrongIds.includes(x.id)); $('wrongList').innerHTML=arr.length?arr.slice(-24).reverse().map(x=>`<div class="mini"><b>${htmlEscape(x.word)}</b> <span class="badge ${x.kind==='考点词'?'main':'rep'}">${x.kind}</span><p>${htmlEscape(x.meaning)}</p><p class="note">${x.cat}｜第 ${groupStart(x)}-${groupEnd(x)} 组｜对应考点词：${htmlEscape(x.parent)}</p></div>`).join(''):'<div class="note">暂无错题</div>'}
$('start').onclick=start; $('next').onclick=next; $('showAnswer').onclick=showAnswer; $('cat').onchange=()=>{populateGroups();start()}; $('group').onchange=start; $('kind').onchange=start; $('order').onchange=start; $('markWrong').onclick=()=>{if(current){addWrong(current.id);renderWrong();$('feedback').innerHTML='已加入错题'}}; $('resetWrong').onclick=()=>{wrongIds=[];localStorage.setItem(KEY,'[]');renderWrong()};
$('counts').innerHTML=`原考点词：第1类 ${COUNTS.main1} 个，第2类 ${COUNTS.main2} 个，第3类 ${COUNTS.main3} 个，合计 ${COUNTS.mainTotal} 个。<br>真题替换：第1类 ${COUNTS.repl1} 个，第2类 ${COUNTS.repl2} 个，第3类 ${COUNTS.repl3} 个，合计 ${COUNTS.replTotal} 个。<br>当前总题库：${COUNTS.allTotal} 题。<br>分组规则：按原考点词序号每 5 个一组；替换词跟随对应考点词进入同一组。`;
populateGroups(); renderWrong(); start();
</script></body></html>
