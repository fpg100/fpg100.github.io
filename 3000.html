<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3000</title>
<style>
:root{--bg:#f7f8fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--brand:#2563eb;--ok:#16a34a;--bad:#dc2626;}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1180px;margin:0 auto;padding:20px} .top{display:flex;gap:16px;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;margin-bottom:16px}
h1{font-size:28px;margin:0 0 6px} .sub{color:var(--muted);font-size:14px} .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:12px 0} .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 22px rgba(15,23,42,.06)}
.stat{padding:14px} .label{font-size:13px;color:var(--muted)} .num{font-size:24px;font-weight:800;margin-top:3px} .main{display:grid;grid-template-columns:1fr 330px;gap:16px;margin-top:16px} .quiz{padding:24px}
.wordbox{background:#f9fafb;border:1px solid var(--line);border-radius:18px;text-align:center;padding:34px 16px;margin:16px 0} .prompt{color:var(--muted);font-size:13px;letter-spacing:.08em;text-transform:uppercase} .word{font-size:48px;font-weight:900;margin:12px 0;word-break:break-word} .meta{display:flex;gap:8px;justify-content:center;flex-wrap:wrap} .badge{background:#eef2ff;color:#3730a3;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px} button{font:inherit} .opt{border:1px solid var(--line);background:white;border-radius:16px;padding:16px;text-align:left;cursor:pointer;min-height:72px;transition:.15s} .opt:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(15,23,42,.08)} .opt.correct{border-color:var(--ok);background:#ecfdf5;color:#065f46} .opt.wrong{border-color:var(--bad);background:#fef2f2;color:#991b1b} .opt:disabled{cursor:default}
.controls,.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center} .controls{margin-top:16px} .btn{border:1px solid var(--line);background:white;border-radius:12px;padding:10px 13px;cursor:pointer} .btn.primary{background:var(--brand);border-color:var(--brand);color:white} .btn.danger{background:#fee2e2;border-color:#fecaca;color:#991b1b} .btn:disabled{opacity:.45;cursor:not-allowed} .notice{margin-top:14px;border-radius:14px;padding:12px 14px;background:#f9fafb;border:1px solid var(--line)} .notice.ok{background:#ecfdf5;border-color:#bbf7d0;color:#065f46} .notice.bad{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.progress{height:10px;border-radius:999px;background:#e5e7eb;overflow:hidden} .bar{height:100%;background:var(--brand);width:0%} .side{display:flex;flex-direction:column;gap:12px} .panel{padding:16px} .panel h2{font-size:18px;margin:0 0 12px} select,input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;font:inherit;background:white} textarea{min-height:150px;font-family:ui-monospace,Consolas,monospace;font-size:13px} .small{font-size:12px;color:var(--muted);line-height:1.5} .wronglist{max-height:320px;overflow:auto;display:flex;flex-direction:column;gap:8px} .wrongitem{border:1px solid var(--line);border-radius:12px;padding:9px;background:#fff} .wordrow{display:flex;justify-content:space-between;gap:8px;font-weight:700} .hidden{display:none} .tablebox{max-height:260px;overflow:auto;border:1px solid var(--line);border-radius:12px} table{width:100%;border-collapse:collapse;font-size:13px} th,td{padding:7px;border-bottom:1px solid var(--line);vertical-align:top} th{position:sticky;top:0;background:#f9fafb;text-align:left}
@media(max-width:850px){.grid{grid-template-columns:repeat(2,1fr)}.main{grid-template-columns:1fr}.opts{grid-template-columns:1fr}.word{font-size:38px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>Longman Communication 3000 背诵系统</h1><div class="sub">标准完整版｜英→中四选一｜每组20词｜错题本｜离线单文件</div></div>
    <div class="row"><button class="btn" id="resetBuiltIn">恢复内置词库</button><button class="btn" id="shuffleBtn">重新随机</button></div>
  </div>
  <div class="grid">
    <div class="card stat"><div class="label">内置词库数量</div><div class="num" id="totalWords">0</div></div>
    <div class="card stat"><div class="label">当前组</div><div class="num" id="groupInfo">-</div></div>
    <div class="card stat"><div class="label">正确率</div><div class="num" id="accuracy">0%</div></div>
    <div class="card stat"><div class="label">错题数</div><div class="num" id="wrongCount">0</div></div>
  </div>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="main">
    <div class="card quiz">
      <div class="row" style="justify-content:space-between"><span class="badge" id="modeBadge">全部练习</span><span class="small" id="qpos">第 1 / 20 题</span></div>
      <div class="wordbox"><div class="prompt">Choose the Chinese meaning</div><div class="word" id="word">-</div><div class="meta"><span class="badge" id="tag">-</span><span class="badge" id="pos">-</span></div><div id="answerLine" class="notice hidden"></div></div>
      <div class="opts" id="options"></div>
      <div id="feedback" class="notice hidden"></div>
      <div class="controls"><button class="btn" id="showAnswer">显示/隐藏答案</button><button class="btn primary" id="nextBtn" disabled>下一题</button><button class="btn" id="restartGroup">重练本组</button></div>
    </div>
    <div class="side">
      <div class="card panel"><h2>分组练习</h2><select id="groupSelect"></select><div class="row" style="margin-top:10px"><button class="btn primary" id="startGroup">开始本组</button><button class="btn" id="allMode">全部随机</button><button class="btn" id="wrongMode">只练错题</button></div><p class="small">每组20词，共自动分组。选择某一组后只练该组。</p></div>
      <div class="card panel"><h2>导入/修订词库</h2><textarea id="importText" placeholder="每行：英文[TAB]中文[TAB]标签"></textarea><div class="row" style="margin-top:10px"><button class="btn" id="importBtn">导入并覆盖</button><button class="btn" id="exportBtn">导出当前词库</button></div><p class="small">导入后会保存到本浏览器；点“恢复内置词库”可回到本文件自带版本。</p></div>
      <div class="card panel"><h2>错题本</h2><div class="wronglist" id="wrongList"><p class="small">还没有错题。</p></div><div class="row" style="margin-top:10px"><button class="btn danger" id="clearWrong">清空错题</button></div></div>
      <div class="card panel"><h2>词库预览</h2><input id="searchBox" placeholder="搜索英文或中文"><div class="tablebox" style="margin-top:10px"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody id="preview"></tbody></table></div></div>
    </div>
  </div>
</div>
<script>

W3"},{"en":"wrong","zh":"错误的, 不正当的, 失常的\\nadv. 错误地","pos":"adj/adv","tag":"S1/S2/W1"},{"en":"yard","zh":"码, 庭院, 工场\\n[化] 堆置场","pos":"n","tag":"S2/W2"},{"en":"yeah","zh":"(非正式)是, 是的","pos":"adv","tag":"S1"},{"en":"year","zh":"年, 年度, 年龄\\n[经] 年度","pos":"n","tag":"S1/W1"},{"en":"yellow","zh":"黄色\\na. 黄色的","pos":"adj","tag":"S2/W3"},{"en":"yep","zh":"是（美国俚语=yes）","pos":"interjection","tag":"S1"},{"en":"yes","zh":"是\\nn. 是, 同意\\nv. 同意","pos":"adv","tag":"S1/W1"},{"en":"yesterday","zh":"昨天\\nadv. 昨天","pos":"adv","tag":"S1/W1"},{"en":"yet","zh":"还, 尚, 仍然, 已经, 然而\\nconj. 然而","pos":"adv/conj","tag":"S1/W1/W2"},{"en":"you","zh":"你, 你们","pos":"pron","tag":"S1/W1"},{"en":"young","zh":"年轻的, 无经验的, 朝气蓬勃的\\nn. 青年们, 幼小动物, 崽","pos":"adj","tag":"S1/W1"},{"en":"youngster","zh":"小孩, 年轻人, 少年\\n[法] 儿童, 少年, 青年","pos":"n","tag":"S3"},{"en":"your","zh":"你的, 你们的","pos":"determiner","tag":"S1/W1"},{"en":"yours","zh":"你的(东西), 你们的(东西)","pos":"pron","tag":"S1/W3"},{"en":"yourself","zh":"你自己","pos":"pron","tag":"S1/W2"},{"en":"youth","zh":"年轻, 青年时代, 青年们, 青春\\n[法] 青年, 青年时期, 青春时期","pos":"n","tag":"S2/W2"},{"en":"zone","zh":"地带, 带, 地区\\nvt. 环绕, 使分成地带\\nvi. 分成区\\n[计] 卡片顶部的三行区; 区; 区域","pos":"n","tag":"W3"}];
const KEY_WORDS='longman3000_words_v3';
const KEY_WRONG='longman3000_wrong_v3';
let words = loadWords();
let wrong = JSON.parse(localStorage.getItem(KEY_WRONG)||'[]');
let questions=[], idx=0, selected=null, answered=false, correct=0, answeredCount=0, mode='all', groupIndex=0;
function loadWords(){
  try{ const saved=JSON.parse(localStorage.getItem(KEY_WORDS)||'null'); if(Array.isArray(saved)&&saved.length>=3000) return saved; }catch(e){}
  return BUILTIN_WORDS.slice();
}
function saveWords(){ localStorage.setItem(KEY_WORDS, JSON.stringify(words)); }
function saveWrong(){ localStorage.setItem(KEY_WRONG, JSON.stringify(wrong)); }
function shuffle(a){ const x=a.slice(); for(let i=x.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [x[i],x[j]]=[x[j],x[i]]; } return x; }
function groupOf(i){ return words.slice(i*20, i*20+20); }
function stripZh(z){ return String(z||'').replace(/\n/g,'；').trim(); }
function makeQuestions(pool){
  const all=words.filter(w=>w.zh && !w.zh.includes('缺少中文'));
  return shuffle(pool).map(w=>{
    let wrongs=shuffle(all.filter(x=>x.en!==w.en && x.zh!==w.zh)).slice(0,3).map(x=>stripZh(x.zh));
    while(wrongs.length<3) wrongs.push('其他释义');
    return {...w, options: shuffle([stripZh(w.zh), ...wrongs])};
  });
}
function start(pool, newMode){ questions=makeQuestions(pool); idx=0; selected=null; answered=false; correct=0; answeredCount=0; mode=newMode||mode; render(); }
function renderGroups(){ const sel=document.getElementById('groupSelect'); const n=Math.ceil(words.length/20); sel.innerHTML=''; for(let i=0;i<n;i++){ const op=document.createElement('option'); op.value=i; op.textContent=`第 ${i+1} 组（${i*20+1}-${Math.min((i+1)*20,words.length)}）`; sel.appendChild(op); } sel.value=groupIndex; }
function render(){
  renderGroups(); document.getElementById('totalWords').textContent=words.length;
  const nGroups=Math.ceil(words.length/20); document.getElementById('groupInfo').textContent= mode==='group'?`${groupIndex+1}/${nGroups}`:'随机';
  document.getElementById('wrongCount').textContent=wrong.length; document.getElementById('accuracy').textContent= answeredCount?Math.round(correct/answeredCount*100)+'%':'0%';
  const total=questions.length||1; document.getElementById('bar').style.width=Math.min(100,(answeredCount/total)*100)+'%';
  const q=questions[idx]; if(!q){document.getElementById('word').textContent='暂无题目'; return;}
  document.getElementById('modeBadge').textContent=mode==='wrong'?'错题练习':mode==='group'?'分组练习':'全部随机'; document.getElementById('qpos').textContent=`第 ${idx+1} / ${questions.length} 题`;
  document.getElementById('word').textContent=q.en; document.getElementById('tag').textContent=q.tag||'Longman'; document.getElementById('pos').textContent=q.pos||'';
  const ans=document.getElementById('answerLine'); ans.classList.add('hidden'); ans.textContent='答案：'+stripZh(q.zh);
  const fb=document.getElementById('feedback'); fb.className='notice hidden'; fb.textContent='';
  const opts=document.getElementById('options'); opts.innerHTML='';
  q.options.forEach((op,i)=>{ const b=document.createElement('button'); b.className='opt'; b.innerHTML=`<b>${String.fromCharCode(65+i)}.</b> ${op}`; b.disabled=answered; if(answered&&op===stripZh(q.zh)) b.classList.add('correct'); if(answered&&selected===op&&op!==stripZh(q.zh)) b.classList.add('wrong'); b.onclick=()=>choose(op); opts.appendChild(b); });
  document.getElementById('nextBtn').disabled=!answered;
  renderWrong(); renderPreview();
}
function choose(op){ if(answered) return; selected=op; answered=true; answeredCount++; const q=questions[idx]; const ok=op===stripZh(q.zh); if(ok) correct++; else if(!wrong.some(w=>w.en===q.en)){ wrong.push(q); saveWrong(); } render(); const fb=document.getElementById('feedback'); fb.className='notice '+(ok?'ok':'bad'); fb.textContent=ok?'答对了！':'答错了。正确答案：'+stripZh(q.zh); }
function next(){ if(idx<questions.length-1){ idx++; selected=null; answered=false; render(); } else { alert('本轮完成！正确率：'+(answeredCount?Math.round(correct/answeredCount*100):0)+'%'); } }
function renderWrong(){ const box=document.getElementById('wrongList'); if(!wrong.length){box.innerHTML='<p class="small">还没有错题。</p>'; return;} box.innerHTML=wrong.map(w=>`<div class="wrongitem"><div class="wordrow"><span>${escapeHtml(w.en)}</span><span class="small">${escapeHtml(w.tag||'')}</span></div><div class="small">${escapeHtml(stripZh(w.zh))}</div></div>`).join(''); }
function renderPreview(){ const key=document.getElementById('searchBox').value.trim().toLowerCase(); const list=(key?words.filter(w=>w.en.toLowerCase().includes(key)||w.zh.includes(key)):words).slice(0,80); document.getElementById('preview').innerHTML=list.map(w=>`<tr><td><b>${escapeHtml(w.en)}</b><br><span class="small">${escapeHtml((w.tag||'')+' '+(w.pos||''))}</span></td><td>${escapeHtml(stripZh(w.zh))}</td></tr>`).join(''); }
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
document.getElementById('showAnswer').onclick=()=>document.getElementById('answerLine').classList.toggle('hidden');
document.getElementById('nextBtn').onclick=next; document.getElementById('restartGroup').onclick=()=>start(questions.map(q=>({en:q.en,zh:q.zh,pos:q.pos,tag:q.tag})),mode);
document.getElementById('shuffleBtn').onclick=()=>start(words,'all'); document.getElementById('allMode').onclick=()=>start(words,'all');
document.getElementById('startGroup').onclick=()=>{groupIndex=+document.getElementById('groupSelect').value; start(groupOf(groupIndex),'group');};
document.getElementById('groupSelect').onchange=e=>{groupIndex=+e.target.value;};
document.getElementById('wrongMode').onclick=()=>{ if(!wrong.length) return alert('还没有错题'); start(wrong,'wrong'); };
document.getElementById('clearWrong').onclick=()=>{wrong=[];saveWrong();render();};
document.getElementById('resetBuiltIn').onclick=()=>{ if(confirm('恢复内置词库并清除自定义覆盖？')){ words=BUILTIN_WORDS.slice(); saveWords(); groupIndex=0; start(groupOf(0),'group'); } };
document.getElementById('importBtn').onclick=()=>{ const rows=document.getElementById('importText').value.split(/\n+/).map(x=>x.trim()).filter(Boolean); const parsed=rows.map(r=>{ const p=r.split(/	|,|，|\s+-\s+|\s+—\s+/).map(x=>x.trim()).filter(Boolean); return p.length>=2?{en:p[0],zh:p[1],tag:p[2]||'导入',pos:p[3]||''}:null; }).filter(Boolean); if(parsed.length<4) return alert('至少导入4个词'); words=parsed; saveWords(); groupIndex=0; start(groupOf(0),'group'); };
document.getElementById('exportBtn').onclick=()=>{ const text=words.map(w=>[w.en,w.zh,w.tag||'',w.pos||''].join('	')).join('\n'); document.getElementById('importText').value=text; };
document.getElementById('searchBox').oninput=renderPreview;
start(groupOf(0),'group');
</script>
