.panel,.quiz,.stat{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:22px;box-shadow:0 10px 28px rgba(15,23,42,.08)}

.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:14px 0}.stat{padding:12px}.stat span{color:var(--muted);font-size:13px}.stat b{display:block;font-size:24px;margin-top:4px}
.bar{height:12px;background:#e2e8f0;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:var(--brand);transition:.25s}
.quiz{padding:22px;margin:14px 0}.tag{display:inline-block;background:#eff6ff;color:#1d4ed8;padding:6px 10px;border-radius:999px;font-size:13px;margin-bottom:10px}
.word{font-size:44px;font-weight:900;text-align:center;margin:18px 0 8px;word-break:break-word}.answer{text-align:center;color:var(--ok);font-size:22px;font-weight:800;min-height:32px;margin-bottom:16px}
.options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.opt{text-align:left;padding:15px;border-radius:16px;background:#f8fafc;border:2px solid var(--line);font-size:18px}.opt.correct{background:#dcfce7;border-color:#22c55e}.opt.wrong{background:#fee2e2;border-color:#ef4444}
.flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:12px;max-height:360px;overflow:auto;padding-right:4px}.card{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:12px}.en{font-weight:900}.zh{color:#334155;margin-top:4px}.small{font-size:12px;color:var(--muted);margin-top:6px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:999px;display:none}
#importBox{display:none}textarea{width:100%;min-height:160px;margin-top:10px}@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}.options{grid-template-columns:1fr}.word{font-size:34px}}

</section>

<section class="stats">

<div class="bar"><i id="bar"></i></div>

<section class="quiz">
  <div class="tag" id="tag">准备开始</div>
  <div class="word" id="word">点击“开始练习”</div>
  <div class="answer" id="answer"></div>
  <div class="options" id="options"></div>
  <div class="flex">
    <button id="toggleAnswer">显示/隐藏答案</button>
    <button class="green" id="nextBtn">下一题</button>
    <button id="restartBtn">重练本组</button>
    <button class="red" id="resetWrongBtn">清空错题</button>
  </div>
</section>

<section class="panel" id="vocabPanel" style="display:none;">

  <div class="list" id="wordList"></div>
</section>
</div>

const STORE = "ntp2b_words_full_v1";
const WRONG = "ntp2b_wrong_full_v1";
let words = JSON.parse(localStorage.getItem(STORE) || "null") || BUILTIN.slice();
let wrongIds = JSON.parse(localStorage.getItem(WRONG) || "[]");
let pool = [], index = 0, answered = false, selected = null, score = {right:0, wrong:0}, current = null, showAns=false;
const GROUP_SIZE = 20;
const $ = id => document.getElementById(id);
const esc = s => String(s??"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
const shuffle = a => { a=[...a]; for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a };
function toast(msg){ $("toast").textContent=msg; $("toast").style.display="block"; setTimeout(()=>$("toast").style.display="none",1700) }
function units(){ return [...new Set(words.map(w => (w.tag||"未分类").split("｜")[0]))]; }
function refreshFilters(){
  const uSel=$("unit"), gSel=$("group");
  const oldU=uSel.value, oldG=gSel.value;
  uSel.innerHTML = '<option value="all">全部单元</option>' + units().map(u=>`<option value="${esc(u)}">${esc(u)}</option>`).join("");
  if([...uSel.options].some(o=>o.value===oldU)) uSel.value=oldU;
  const arr = uSel.value==="all" ? words : words.filter(w=>(w.tag||"").startsWith(uSel.value));
  const groups = Math.max(1, Math.ceil(arr.length/GROUP_SIZE));
  gSel.innerHTML = '<option value="all">全部</option>' + Array.from({length:groups},(_,i)=>`<option value="${i}">第${i+1}组（${i*GROUP_SIZE+1}-${Math.min((i+1)*GROUP_SIZE, arr.length)}）</option>`).join("");
  if([...gSel.options].some(o=>o.value===oldG)) gSel.value=oldG;
}
function filteredBase(){
  let arr = words.slice();
  const u=$("unit").value, s=$("search").value.trim().toLowerCase();
  if(u!=="all") arr=arr.filter(w=>(w.tag||"").startsWith(u));
  if(s) arr=arr.filter(w=>w.en.toLowerCase().includes(s)||w.zh.includes(s)||(w.tag||"").toLowerCase().includes(s));
  if($("order").value==="random") arr=shuffle(arr);
  const g=$("group").value;
  if(g!=="all" && !s) arr=arr.slice(Number(g)*GROUP_SIZE, Number(g)*GROUP_SIZE+GROUP_SIZE);
  return arr;
}
function makeOptions(item){
  let choices=[item.zh];
  for(const m of shuffle(words.filter(w=>w.zh!==item.zh).map(w=>w.zh).filter((v,i,a)=>a.indexOf(v)===i))){ if(choices.length>=4) break; choices.push(m); }
  return shuffle(choices);
}
function start(arr=filteredBase()){ 
  pool = arr.length>=4 ? arr : words.slice(0, Math.min(GROUP_SIZE, words.length));
  index=0; answered=false; selected=null; score={right:0,wrong:0}; showAns=false; render();
}
function render(){
  $("wordTotal").textContent=words.length;
  $("progress").textContent=pool.length?`${index+1}/${pool.length}`:"0/0";
  $("right").textContent=score.right; $("wrong").textContent=score.wrong;
  const done=score.right+score.wrong; $("rate").textContent=done?Math.round(score.right/done*100)+"%":"0%";
  $("bar").style.width=pool.length?Math.min(100,(done/pool.length)*100)+"%":"0%";
  current=pool[index];
  $("options").innerHTML="";
  if(!current){ $("word").textContent="没有题目"; $("tag").textContent=""; $("answer").textContent=""; renderList(); return; }
  $("tag").textContent=current.tag||"";
  $("word").textContent=current.en;
  $("answer").textContent=showAns ? "答案：" + current.zh : "";
  makeOptions(current).forEach((o,i)=>{
    const b=document.createElement("button");
    b.className="opt";
    if(answered && o===current.zh) b.classList.add("correct");
    if(answered && selected===o && o!==current.zh) b.classList.add("wrong");
    b.innerHTML=`<b>${String.fromCharCode(65+i)}.</b> ${esc(o)}`;
    b.onclick=()=>choose(o);
    $("options").appendChild(b);
  });
  renderList();
}
function choose(o){
  if(answered) return;
  answered=true; selected=o; showAns=true;
  if(o===current.zh) score.right++; else { score.wrong++; if(!wrongIds.includes(current.id)) wrongIds.push(current.id); localStorage.setItem(WRONG, JSON.stringify(wrongIds)); }
  render();
}
function next(){
  if(!pool.length) return;
  if(index < pool.length-1){ index++; answered=false; selected=null; showAns=false; render(); }
  else toast("本组完成！");
}
function renderList(){
  const wrongSet=new Set(wrongIds), showing=pool.length?pool:words;
  $("listNote").textContent=`当前显示 ${showing.length} 个；错题 ${wrongIds.length} 个`;
  $("wordList").innerHTML=showing.map(w=>`<div class="card"><div class="en">${esc(w.en)} ${wrongSet.has(w.id)?"⭐":""}</div><div class="zh">${esc(w.zh)}</div><div class="small">${esc(w.tag||"")}</div></div>`).join("");
}
function parse(text){
  return text.split(/\n+/).map((line,i)=>{
    const p=line.split(/\t|\s+-\s+|\s+—\s+|,|，/).map(x=>x.trim()).filter(Boolean);
    return p.length>=2?{id:i+1,en:p[0],zh:p[1],tag:p[2]||"导入词库"}:null;
  }).filter(Boolean);
}
$("startBtn").onclick=()=>start();
$("nextBtn").onclick=next;
$("toggleAnswer").onclick=()=>{showAns=!showAns;render()};
$("restartBtn").onclick=()=>start(pool.length?pool:filteredBase());
$("wrongBtn").onclick=()=>{ const arr=words.filter(w=>wrongIds.includes(w.id)); if(arr.length<1) return toast("还没有错题"); start(arr.length>=4?arr:arr.concat(words.filter(w=>!wrongIds.includes(w.id)).slice(0,4-arr.length))); };
$("resetWrongBtn").onclick=()=>{wrongIds=[];localStorage.removeItem(WRONG);render();toast("错题已清空")};
$("unit").onchange=()=>{refreshFilters();};
$("showImport").onclick=()=>{$("importBox").style.display=$("importBox").style.display==="block"?"none":"block"};
$("importBtn").onclick=()=>{const p=parse($("importText").value); if(p.length<4) return toast("至少需要4个词"); words=p; wrongIds=[]; localStorage.setItem(STORE,JSON.stringify(words)); localStorage.removeItem(WRONG); refreshFilters(); start(words.slice(0,GROUP_SIZE));};
$("restoreBtn").onclick=()=>{words=BUILTIN.slice(); wrongIds=[]; localStorage.removeItem(STORE); localStorage.removeItem(WRONG); refreshFilters(); start(words.slice(0,GROUP_SIZE));};
$("exportBtn").onclick=()=>{const txt=words.map(w=>`${w.en}\t${w.zh}\t${w.tag||""}`).join("\n"); const blob=new Blob([txt],{type:"text/plain;charset=utf-8"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="New_Treasure_Plus_2B_vocabulary.tsv"; a.click(); URL.revokeObjectURL(a.href);};
refreshFilters(); start(words.slice(0,GROUP_SIZE));
</script>
